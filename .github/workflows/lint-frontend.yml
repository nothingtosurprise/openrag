name: Frontend Lint

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/lint-frontend.yml'

jobs:
  biome:
    name: Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Biome check
        working-directory: frontend
        run: npm run lint

  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npm run typecheck

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: React Doctor score check
        working-directory: frontend
        run: |
          SCORE=$(npx -y react-doctor@0.7.2 --score --yes)
          echo "React Doctor score: $SCORE"
          if [ "$SCORE" -lt 40 ]; then
            echo "::error::React Doctor score $SCORE is below the minimum threshold of 40"
            npx -y react-doctor@0.7.2 --verbose --yes
            exit 1
          fi

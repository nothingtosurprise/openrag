{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openrag.fullname" . }}-backend
  namespace: {{ include "openrag.namespace" . }}
  labels:
    {{- include "openrag.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.backend.ingestRouter.enabled }}
    - port: {{ .Values.backend.ingestRouter.port }}
      targetPort: ingest-router
      protocol: TCP
      name: ingest-router
    {{- end }}
  selector:
    {{- include "openrag.backend.selectorLabels" . | nindent 4 }}
{{- end }}
